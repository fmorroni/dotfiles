"$schema" = "https://starship.rs/config-schema.json"

format = """
[вЦСвЦТвЦУ](#a3aed2)\
[ пМГ ](bg:#a3aed2 fg:#090c0c)\
[оВі](fg:#a3aed2 bg:#8da6e6)\
${custom.yazi}\
[оВі](fg:#8da6e6 bg:#769ff0)\
$directory\
[оВі](fg:#769ff0 bg:#556a9a)\
$hostname\
[оВі](fg:#556a9a bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$ruby\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#212736 bg:#1d2230)\
$time\
[оВі ](fg:#1d2230)\
\n$character"""

[custom.yazi]
when = '[ -n "$YAZI_LEVEL" ]'
shell = ["sh"]
command = '''
i=0
while [ "$i" -lt "$YAZI_LEVEL" ]; do
  printf "рЯ¶Ж"
  i=$((i + 1))
done
'''
format = "[ $output ](bg:#8da6e6 fg:#090c0c)"

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[hostname]
ssh_only = true
format = "[ пТЙ $hostname ]($style)"
style = "bg:#556a9a fg:#9bb4f2"

[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = "[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)"

[git_status]
style = "bg:#394260"
format = "[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)"

[ruby]
symbol = "оЮС "
style = "bg:#212736"
format = "[[ $symbol ](fg:#769ff0 bg:#212736)]($style)"

[nodejs]
symbol = "оЬШ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[rust]
symbol = "оЮ®"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[golang]
symbol = "оШІ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[php]
symbol = "оШИ"
style = "bg:#212736"
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"

[time]
disabled = false
time_format = "%R"  # Hour:Minute Format
style = "bg:#1d2230"
format = "[[ пРЇ $time ](fg:#a0a9cb bg:#1d2230)]($style)"
